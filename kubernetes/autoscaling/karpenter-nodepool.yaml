apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: redemption
spec:
  template:
    metadata:
      labels:
        workload: redemption
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: redemption
      # Spot first, on-demand fallback. Karpenter prefers spot when
      # available and falls through to on-demand if no spot pool can
      # satisfy the pending pods — gives 60–70% cost saving on the
      # bursty layer without sacrificing the spike-handling promise.
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["2", "4", "8"]
        - key: topology.kubernetes.io/zone
          operator: In
          # Bangkok (ap-southeast-7) for the primary cluster. The DR
          # Karpenter NodePool (applied only to the Singapore cluster)
          # lives at kubernetes/autoscaling/karpenter-nodepool-dr.yaml
          # and pins ap-southeast-1 zones.
          values: ["ap-southeast-7a", "ap-southeast-7b", "ap-southeast-7c"]
      expireAfter: 720h
      terminationGracePeriod: 60s
  disruption:
    # WhenEmptyOrUnderutilized lets Karpenter consolidate after the
    # scale-down stabilization expires. The 5-minute consolidateAfter
    # avoids rapid churn while the HPA is still settling.
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
    budgets:
      # Never disrupt more than 20% of redemption nodes at once and
      # block all disruptions during the busiest commerce window.
      - nodes: "20%"
      - nodes: "0"
        schedule: "0 18 * * *"
        duration: 4h
        reasons: ["Underutilized", "Drifted"]
  limits:
    cpu: "2000"
    memory: 4000Gi
  weight: 100
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: redemption
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: redemption-prod-th-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: redemption-prod-th
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: redemption-prod-th
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    # IMDSv2 required, hop limit 1: blocks the SSRF-to-credential
    # pattern that has compromised plenty of k8s workloads.
    httpTokens: required
    httpPutResponseHopLimit: 1
    httpEndpoint: enabled
  tags:
    Project: redemption
    Environment: prod
