apiVersion: apps/v1
kind: Deployment
metadata:
  name: redemption
  namespace: redemption
  labels:
    app.kubernetes.io/name: redemption
    app.kubernetes.io/component: api
spec:
  # Baseline of 6 replicas — two per AZ — so we keep quorum even
  # if a full AZ disappears mid-flash-sale. HPA scales out from here.
  replicas: 6
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: redemption
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redemption
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: redemption
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Spread across AZs and nodes. topologySpreadConstraints with
      # whenUnsatisfiable: ScheduleAnyway lets bursts proceed but
      # nudges the scheduler towards balanced placement.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: redemption
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: redemption
      affinity:
        # Hard anti-affinity per host stops two replicas dying together
        # when a single EC2 instance is interrupted.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: redemption
      containers:
        - name: redemption
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-7.amazonaws.com/redemption-prod-th/redemption:IMMUTABLE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: AWS_REGION
              value: ap-southeast-7
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4317
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          envFrom:
            - secretRef:
                name: redemption-runtime
          resources:
            # Requests sized from steady-state p95 CPU + 20% headroom.
            # Limits at 2x request so a hot pod can absorb a burst
            # before HPA reacts (~30s) without getting CFS-throttled.
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            # Slow-start friendly: 30 * 2s = 60s max boot window
            # before liveness takes over. Stops cold JVM/Node images
            # being killed before warm-up completes.
            httpGet: { path: /healthz/startup, port: http }
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /healthz/ready, port: http }
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet: { path: /healthz/live, port: http }
            periodSeconds: 10
            failureThreshold: 6
          lifecycle:
            preStop:
              # Delay SIGTERM long enough for the ALB target-group
              # deregistration to propagate; otherwise in-flight
              # requests are 502'd on rollouts.
              exec:
                command: ["/bin/sh", "-c", "sleep 20"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/redemption
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 256Mi }
        - name: cache
          emptyDir: { sizeLimit: 512Mi }
