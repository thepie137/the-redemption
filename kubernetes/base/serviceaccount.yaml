apiVersion: v1
kind: ServiceAccount
metadata:
  name: redemption
  namespace: redemption
  # No IRSA annotation needed: this ServiceAccount gets its AWS identity via
  # an EKS Pod Identity association (Terraform: pod_identity_associations in
  # the eks module → aws_iam_role.app_pod_identity_*). The role grants only
  # SecretsManager:GetSecretValue on redemption/* and KMS:Decrypt on the
  # app + rds keys, plus scoped S3 access to the redemption bucket.
