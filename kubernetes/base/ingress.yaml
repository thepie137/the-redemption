apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redemption
  namespace: redemption
  annotations:
    # AWS Load Balancer Controller provisions a regional ALB in the
    # public subnets. TLS terminates here; the ALB → pod hop stays
    # inside the VPC and is additionally encrypted by the service mesh.
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    # ap-southeast-7 (Bangkok) for the primary cluster; the SG overlay swaps
    # the region. ARNs come from `terraform output` (waf_th_acl_arn etc.).
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-7:ACCOUNT_ID:certificate/REDEMPTION_CERT
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:ap-southeast-7:ACCOUNT_ID:regional/webacl/redemption-prod-th-waf/UUID
    alb.ingress.kubernetes.io/healthcheck-path: /healthz/ready
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "10"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/success-codes: "200"
    # Deregistration delay tuned to match the pod's preStop sleep.
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
spec:
  rules:
    - host: redemption.loyalty.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redemption
                port:
                  number: 80
