apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      # Primary cluster region (Bangkok). The SG overlay sets ap-southeast-1;
      # the replicated secret resolves under the same name in either region.
      region: ap-southeast-7
      # The controller pod assumes a dedicated IRSA role with
      # secretsmanager:GetSecretValue restricted to redemption/*.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redemption-runtime
  namespace: redemption
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: redemption-runtime
    creationPolicy: Owner
  dataFrom:
    - extract:
        # Single Secrets Manager secret JSON; each top-level key
        # becomes an env var on the redemption pod. Rotation handled
        # natively by Secrets Manager + the 1h refresh above.
        key: redemption/prod/runtime
