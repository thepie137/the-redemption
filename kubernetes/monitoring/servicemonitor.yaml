apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redemption
  namespace: redemption
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redemption
  namespaceSelector:
    matchNames: [redemption]
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redemption-slo
  namespace: redemption
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: redemption.availability
      rules:
        - alert: RedemptionPodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="redemption"}[15m]) > 0.2
          for: 10m
          labels: { severity: page }
          annotations:
            summary: "Redemption pod restarting > 12 times / hr"
            runbook: "https://runbooks/redemption/crashloop"
        - alert: RedemptionInsufficientReplicas
          expr: |
            kube_deployment_status_replicas_available{namespace="redemption",deployment="redemption"}
              < kube_deployment_spec_replicas{namespace="redemption",deployment="redemption"} * 0.8
          for: 5m
          labels: { severity: page }
          annotations:
            summary: "Redemption available replicas below 80% of desired"
            runbook: "https://runbooks/redemption/replicas"
